<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="assets/weather-style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p class="subtitle">Get real-time weather information</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search city (e.g., London, New York, Tokyo)"
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">Search</button>
                <button id="locationBtn" class="location-btn" title="Use my location">📍</button>
            </div>
            <div id="suggestions" class="suggestions"></div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden"></div>

        <!-- Current Weather Section -->
        <div id="currentWeather" class="current-weather hidden">
            <div class="weather-header">
                <div class="city-info">
                    <h2 id="cityName"></h2>
                    <p id="currentDate"></p>
                </div>
                <div class="weather-icon-large">
                    <img id="weatherIcon" src="" alt="Weather">
                </div>
            </div>
            
            <div class="temperature-section">
                <div class="temp-main">
                    <span id="temperature" class="temperature"></span>
                    <span class="degree">°C</span>
                </div>
                <div class="weather-description">
                    <p id="weatherDesc"></p>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <span class="detail-label">💧 Humidity</span>
                    <span id="humidity" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">💨 Wind Speed</span>
                    <span id="windSpeed" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">🔽 Pressure</span>
                    <span id="pressure" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">👁️ Visibility</span>
                    <span id="visibility" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">☀️ Feels Like</span>
                    <span id="feelsLike" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">🌅 UV Index</span>
                    <span id="uvIndex" class="detail-value"></span>
                </div>
            </div>
        </div>

        <!-- Forecast Section -->
        <div id="forecastSection" class="forecast-section hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecastContainer" class="forecast-container"></div>
        </div>

        <!-- Hourly Forecast Section -->
        <div id="hourlySection" class="hourly-section hidden">
            <h3>Hourly Forecast (Next 24 Hours)</h3>
            <div id="hourlyContainer" class="hourly-container"></div>
        </div>

        <!-- Recent Searches -->
        <div class="recent-searches">
            <h3>Recent Searches</h3>
            <div id="recentSearches" class="recent-list"></div>
        </div>
    </div>

    <script src="scripts/weather-app.js"></script>
</body>
</html>
