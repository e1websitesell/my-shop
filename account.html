<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account</title>
<style>
  :root {
    --primary-color: #1a1d29;
    --accent-color: #6b7280;
    --site-font: system-ui, sans-serif;
    --btn-radius: 8px;
    --ink: #1a1d29;
    --ink-soft: #6b7280;
    --line: #e5e7eb;
    --bg: #f7f7f9;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--site-font); color: var(--ink); background: #fff; }
  a { text-decoration: none; color: inherit; }
  .muted { color: var(--ink-soft); font-size: 14px; }

  .site-header { border-bottom: 1px solid var(--line); position: sticky; top: 0; background: #fff; z-index: 10; }
  .header-inner { max-width: 1140px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 700; }
  .brand img { height: 34px; width: auto; }
  .main-nav { display: flex; align-items: center; gap: 26px; font-size: 14.5px; font-weight: 500; }
  .cart-link { position: relative; }
  .cart-badge { position: absolute; top: -9px; right: -14px; background: var(--accent-color); color: #fff; font-size: 11px; min-width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; }
  .lang-toggle { border: 1px solid var(--line); background: #fff; padding: 7px 14px; border-radius: var(--btn-radius); font-size: 13px; cursor: pointer; font-family: inherit; }

  .page-inner { max-width: 720px; margin: 0 auto; padding: 32px 20px 70px; }
  .page-title { font-size: 24px; font-weight: 700; margin: 0 0 24px; display: flex; justify-content: space-between; align-items: center; }
  .logout-btn { border: 1px solid var(--line); background: #fff; padding: 9px 18px; border-radius: var(--btn-radius); font-size: 13.5px; cursor: pointer; font-family: inherit; }

  .card { background: var(--bg); border-radius: 12px; padding: 22px 24px; margin-bottom: 28px; }
  .card h2 { font-size: 16px; margin: 0 0 16px; font-weight: 700; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; }
  .field input { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--btn-radius); font-size: 14.5px; font-family: inherit; background: #fff; }
  .field input:disabled { color: var(--ink-soft); background: #f0f0f2; }
  .save-row { display: flex; align-items: center; gap: 14px; }
  .save-btn { background: var(--primary-color); color: #fff; border: none; padding: 10px 22px; border-radius: var(--btn-radius); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }

  .order-card { border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
  .order-head { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
  .order-date { color: var(--ink-soft); }
  .order-status { font-weight: 600; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
  .status-pending { background: #fef3c7; color: #92400e; }
  .status-completed { background: #dcfce7; color: #15803d; }
  .status-cancelled { background: #fee2e2; color: #b91c1c; }
  .order-items { font-size: 14px; margin-bottom: 6px; }
  .order-total { font-weight: 700; font-size: 14.5px; }

  .site-footer { border-top: 1px solid var(--line); padding: 28px 20px; margin-top: 40px; }
  .footer-inner { max-width: 1140px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; font-size: 13.5px; color: var(--ink-soft); }
</style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <img id="logoImg" src="" alt="" style="display:none;">
        <span id="shopNameText"></span>
      </a>
      <nav class="main-nav">
        <a href="index.html" data-i18n="home">হোম</a>
        <a href="shop.html" data-i18n="shop">শপ</a>
        <a href="cart.html" class="cart-link">
          <span data-i18n="cart">কার্ট</span>
          <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
        </a>
      </nav>
      <button id="langToggle" class="lang-toggle">English</button>
    </div>
  </header>

  <main class="page-inner">
    <div class="page-title">
      <span>আমার অ্যাকাউন্ট</span>
      <button class="logout-btn" id="logoutBtn">লগআউট</button>
    </div>

    <div class="card">
      <h2>প্রোফাইল</h2>
      <form id="profileForm">
        <div class="field"><label>ইমেইল</label><input type="text" id="profileEmail" disabled></div>
        <div class="field"><label for="profileName">নাম</label><input type="text" id="profileName" required></div>
        <div class="field"><label for="profilePhone">ফোন</label><input type="text" id="profilePhone"></div>
        <div class="save-row">
          <button type="submit" class="save-btn" id="profileSaveBtn">সেভ করুন</button>
          <span class="muted" id="profileStatus"></span>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>অর্ডার হিস্ট্রি</h2>
      <div id="ordersList"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span><span id="footerShopName"></span> © <span id="footerYear"></span></span>
    </div>
  </footer>

  <script type="module">
    import { auth, db } from "./assets/js/firebase-config.js";
    import { loadThemeAndSettings } from "./assets/js/theme-loader.js";
    import { getLang, setLang, applyTranslations } from "./assets/js/translations.js";
    import { getCart, updateCartBadge } from "./assets/js/cart.js";
    import { onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc, getDoc, setDoc, collection, query, where, orderBy, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    function escapeAttr(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;");
    }

    document.getElementById("langToggle").addEventListener("click", () => {
      setLang(getLang() === "bn" ? "en" : "bn");
      location.reload();
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    let currentUser = null;

    async function pushCartToFirestore(uid) {
      try {
        const cart = getCart();
        for (const item of cart) {
          const cartItemId = item.productId + "_" + item.variantCode;
          await setDoc(doc(db, "users", uid, "cart", cartItemId), item);
        }
      } catch (e) {
        // ব্যাকগ্রাউন্ড সিঙ্ক, ফেইল হলেও পেজের বাকি অংশ কাজ করবে
      }
    }

    async function loadProfile() {
      document.getElementById("profileEmail").value = currentUser.email;
      try {
        const snap = await getDoc(doc(db, "users", currentUser.uid));
        if (snap.exists()) {
          const u = snap.data();
          document.getElementById("profileName").value = u.name || currentUser.displayName || "";
          document.getElementById("profilePhone").value = u.phone || "";
        } else {
          document.getElementById("profileName").value = currentUser.displayName || "";
        }
      } catch (e) {
        // প্রোফাইল লোড না হলেও বাকি পেজ কাজ করবে
      }
    }

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("profileName").value.trim();
      const phone = document.getElementById("profilePhone").value.trim();

      const btn = document.getElementById("profileSaveBtn");
      btn.disabled = true;
      btn.textContent = "সেভ হচ্ছে...";

      try {
        await setDoc(doc(db, "users", currentUser.uid), { name, phone, email: currentUser.email }, { merge: true });
        await updateProfile(currentUser, { displayName: name });
        document.getElementById("profileStatus").textContent = "সেভ হয়েছে ✓";
        setTimeout(() => { document.getElementById("profileStatus").textContent = ""; }, 2000);
      } catch (e) {
        alert("সেভ করতে সমস্যা হয়েছে।");
      } finally {
        btn.disabled = false;
        btn.textContent = "সেভ করুন";
      }
    });

    async function loadOrders() {
      const wrap = document.getElementById("ordersList");
      wrap.innerHTML = `<p class="muted">লোড হচ্ছে...</p>`;
      try {
        // এই কোয়েরির জন্যও Firestore প্রথমবার কম্পোজিট ইনডেক্স বানাতে বলতে
        // পারে, কনসোলে দেখানো লিংকে ক্লিক করলেই হয়ে যাবে।
        const q = query(
          collection(db, "orders"),
          where("customerUid", "==", currentUser.uid),
          orderBy("createdAt", "desc")
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          wrap.innerHTML = `<p class="muted">এখনো কোনো অর্ডার নেই।</p>`;
          return;
        }

        wrap.innerHTML = "";
        const statusLabel = { pending: "পেন্ডিং", completed: "সম্পন্ন", cancelled: "বাতিল" };
        snap.forEach((docSnap) => {
          const o = docSnap.data();
          const itemsText = (o.items || []).map((i) =>
            i.productName + (i.variantName ? " (" + i.variantName + ")" : "") + " x" + i.qty
          ).join(", ");
          const time = (o.createdAt && o.createdAt.toDate) ? o.createdAt.toDate().toLocaleDateString("bn-BD") : "";

          const card = document.createElement("div");
          card.className = "order-card";
          card.innerHTML =
            `<div class="order-head"><span class="order-date">${time}</span><span class="order-status status-${o.status}">${statusLabel[o.status] || o.status}</span></div>` +
            `<div class="order-items">${escapeAttr(itemsText)}</div>` +
            `<div class="order-total">৳${o.totalAmount}</div>`;
          wrap.appendChild(card);
        });
      } catch (e) {
  console.error("অর্ডার লোড করতে সমস্যা হয়েছে।", e);
  alert(e.message);
}
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUser = user;

      applyTranslations();
      updateCartBadge();
      document.getElementById("langToggle").textContent = getLang() === "bn" ? "English" : "বাংলা";

      const settings = await loadThemeAndSettings();
      const lang = getLang();
      const shopName = lang === "bn" ? (settings.shopName_bn || settings.shopName_en) : (settings.shopName_en || settings.shopName_bn);
      document.getElementById("shopNameText").textContent = shopName || "Shop";
      document.getElementById("footerShopName").textContent = shopName || "Shop";
      document.getElementById("footerYear").textContent = new Date().getFullYear();
      if (settings.logoUrl) {
        const logoImg = document.getElementById("logoImg");
        logoImg.src = settings.logoUrl;
        logoImg.style.display = "inline-block";
      }

      await pushCartToFirestore(user.uid);
      loadProfile();
      loadOrders();
    });
  </script>

</body>
</html>
