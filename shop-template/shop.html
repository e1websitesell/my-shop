<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<style>
  :root {
    --primary-color: #1a1d29;
    --accent-color: #6b7280;
    --site-font: system-ui, sans-serif;
    --btn-radius: 8px;
    --ink: #1a1d29;
    --ink-soft: #6b7280;
    --line: #e5e7eb;
    --bg: #f7f7f9;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--site-font); color: var(--ink); background: #fff; }
  a { text-decoration: none; color: inherit; }
  .muted { color: var(--ink-soft); font-size: 14px; }

  .site-header { border-bottom: 1px solid var(--line); position: sticky; top: 0; background: #fff; z-index: 10; }
  .header-inner { max-width: 1140px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 700; }
  .brand img { height: 34px; width: auto; }
  .main-nav { display: flex; align-items: center; gap: 26px; font-size: 14.5px; font-weight: 500; }
  .cart-link { position: relative; }
  .cart-badge {
    position: absolute; top: -9px; right: -14px; background: var(--accent-color); color: #fff;
    font-size: 11px; min-width: 18px; height: 18px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center; padding: 0 4px;
  }
  .lang-toggle { border: 1px solid var(--line); background: #fff; padding: 7px 14px; border-radius: var(--btn-radius); font-size: 13px; cursor: pointer; font-family: inherit; }

  .page-inner { max-width: 1140px; margin: 0 auto; padding: 32px 20px 60px; }
  .page-title { font-size: 24px; font-weight: 700; margin: 0 0 24px; }

  .filter-bar { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .search-box { flex: 1; min-width: 220px; }
  .search-box input { width: 100%; padding: 11px 16px; border: 1px solid var(--line); border-radius: var(--btn-radius); font-size: 14.5px; font-family: inherit; }
  .category-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { border: 1px solid var(--line); background: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13.5px; cursor: pointer; font-family: inherit; }
  .pill.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

  .results-label { font-size: 13px; color: var(--ink-soft); margin-bottom: 18px; min-height: 16px; }

  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 22px; }
  .product-card-wrap { display: flex; flex-direction: column; gap: 8px; }
  .product-img { width: 100%; height: 200px; border-radius: 10px; background-size: cover; background-position: center; background-color: var(--bg); }
  .product-info { padding-top: 4px; }
  .product-name { font-size: 14.5px; font-weight: 600; margin-bottom: 4px; }
  .product-stars { color: #d97706; font-size: 12.5px; margin-bottom: 4px; }
  .price-now { font-weight: 700; color: var(--ink); }
  .price-old { text-decoration: line-through; color: var(--ink-soft); font-size: 13px; margin-left: 6px; }
  .quick-add {
    border: 1px solid var(--line); background: #fff; color: var(--primary-color);
    padding: 8px; border-radius: var(--btn-radius); font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .quick-add:hover { background: var(--bg); }

  .site-footer { border-top: 1px solid var(--line); padding: 28px 20px; margin-top: 40px; }
  .footer-inner { max-width: 1140px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; font-size: 13.5px; color: var(--ink-soft); }
  .footer-links { display: flex; gap: 18px; }
</style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <img id="logoImg" src="" alt="" style="display:none;">
        <span id="shopNameText"></span>
      </a>
      <nav class="main-nav">
        <a href="index.html" data-i18n="home">হোম</a>
        <a href="shop.html" data-i18n="shop">শপ</a>
        <a href="cart.html" class="cart-link">
          <span data-i18n="cart">কার্ট</span>
          <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
        </a>
        <a href="login.html" data-i18n="login">লগইন</a>
      </nav>
      <button id="langToggle" class="lang-toggle">English</button>
    </div>
  </header>

  <main class="page-inner">
    <h1 class="page-title" data-i18n="shop">শপ</h1>

    <div class="filter-bar">
      <div class="search-box">
        <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="প্রোডাক্ট খুঁজুন...">
      </div>
    </div>
    <div class="category-pills" id="categoryPills"></div>
    <div class="results-label" id="resultsLabel"></div>

    <div class="product-grid" id="productGrid"></div>
    <p class="muted" id="productEmpty" style="display:none;"></p>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span><span id="footerShopName"></span> © <span id="footerYear"></span></span>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy-policy.html">Privacy Policy</a>
      </div>
    </div>
  </footer>

  <script type="module">
    import { db } from "./assets/js/firebase-config.js";
    import { loadThemeAndSettings } from "./assets/js/theme-loader.js";
    import { getLang, setLang, applyTranslations, t } from "./assets/js/translations.js";
    import { addToCart, updateCartBadge } from "./assets/js/cart.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    function escapeAttr(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;");
    }

    document.getElementById("langToggle").addEventListener("click", () => {
      setLang(getLang() === "bn" ? "en" : "bn");
      location.reload();
    });

    const urlParams = new URLSearchParams(location.search);
    let selectedCategory = urlParams.get("category") || "";
    let allProducts = [];
    let fuse = null;
    let categoriesMap = {};

    async function loadAllProducts() {
      const snap = await getDocs(collection(db, "products"));
      allProducts = [];
      snap.forEach((docSnap) => {
        allProducts.push({ id: docSnap.id, ...docSnap.data() });
      });
      fuse = new Fuse(allProducts, {
        keys: ["name_bn", "name_en", "tags"],
        threshold: 0.4,
        ignoreLocation: true
      });
    }

    async function loadCategoryPills() {
      const wrap = document.getElementById("categoryPills");
      try {
        const snap = await getDocs(collection(db, "categories"));
        const lang = getLang();
        let html = `<button type="button" class="pill ${selectedCategory === "" ? "active" : ""}" data-slug="">${lang === "bn" ? "সব" : "All"}</button>`;
        snap.forEach((docSnap) => {
          const c = docSnap.data();
          const name = lang === "bn" ? (c.name_bn || c.name_en) : (c.name_en || c.name_bn);
          categoriesMap[c.slug] = name;
          html += `<button type="button" class="pill ${selectedCategory === c.slug ? "active" : ""}" data-slug="${escapeAttr(c.slug)}">${escapeAttr(name)}</button>`;
        });
        wrap.innerHTML = html;

        wrap.querySelectorAll(".pill").forEach((btn) => {
          btn.addEventListener("click", () => {
            wrap.querySelectorAll(".pill").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            selectedCategory = btn.dataset.slug;
            applyFilters();
          });
        });
      } catch (e) {
        // ক্যাটাগরি পিল লোড না হলেও সার্চ/প্রোডাক্ট লিস্ট কাজ করবে
      }
    }

    function updateResultsLabel(count) {
      const label = document.getElementById("resultsLabel");
      const lang = getLang();
      const parts = [];
      if (selectedCategory && categoriesMap[selectedCategory]) parts.push(categoriesMap[selectedCategory]);
      const searchTerm = document.getElementById("searchInput").value.trim();
      if (searchTerm) parts.push((lang === "bn" ? "সার্চ: " : "Search: ") + searchTerm);
      label.textContent = parts.length ? parts.join(" · ") + " (" + count + ")" : "";
    }

    function applyFilters() {
      const searchTerm = document.getElementById("searchInput").value.trim();
      let results = allProducts;

      if (searchTerm) {
        results = fuse.search(searchTerm).map((r) => r.item);
      }
      if (selectedCategory) {
        results = results.filter((p) => p.category === selectedCategory);
      }

      updateResultsLabel(results.length);
      renderProducts(results);
    }

    function renderProducts(results) {
      const grid = document.getElementById("productGrid");
      const empty = document.getElementById("productEmpty");

      if (results.length === 0) {
        grid.innerHTML = "";
        empty.textContent = getLang() === "bn" ? "কোনো প্রোডাক্ট পাওয়া যায়নি।" : "No products found.";
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      const lang = getLang();
      grid.innerHTML = results.map((p) => {
        const name = lang === "bn" ? (p.name_bn || p.name_en) : (p.name_en || p.name_bn);
        const img = (p.images && p.images[0]) || "";
        const price = p.discountPrice
          ? "<span class='price-now'>৳" + p.discountPrice + "</span> <span class='price-old'>৳" + p.basePrice + "</span>"
          : "<span class='price-now'>৳" + p.basePrice + "</span>";
        const stars = p.avgRating ? "★".repeat(Math.round(p.avgRating)) : "";
        const addBtn = !p.hasVariants
          ? "<button type='button' class='quick-add' data-id='" + p.id + "'>" + t("add_to_cart") + "</button>"
          : "";

        return (
          "<div class='product-card-wrap'>" +
            "<a href='product.html?id=" + p.id + "' class='product-card'>" +
              "<div class='product-img' style=\"background-image:url('" + escapeAttr(img) + "');\"></div>" +
              "<div class='product-info'>" +
                "<div class='product-name'>" + escapeAttr(name) + "</div>" +
                (stars ? "<div class='product-stars'>" + stars + "</div>" : "") +
                "<div class='product-price'>" + price + "</div>" +
              "</div>" +
            "</a>" +
            addBtn +
          "</div>"
        );
      }).join("");

      grid.querySelectorAll(".quick-add").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          const product = allProducts.find((p) => p.id === btn.dataset.id);
          if (!product) return;
          const lang2 = getLang();
          const name2 = lang2 === "bn" ? (product.name_bn || product.name_en) : (product.name_en || product.name_bn);
          addToCart({
            productId: product.id,
            variantCode: product.id,
            variantName: "",
            name: name2,
            price: product.discountPrice || product.basePrice,
            image: (product.images && product.images[0]) || "",
            qty: 1
          });
          updateCartBadge();
          btn.textContent = lang2 === "bn" ? "যুক্ত হয়েছে ✓" : "Added ✓";
          setTimeout(() => { btn.textContent = t("add_to_cart"); }, 1500);
        });
      });
    }

    async function init() {
      applyTranslations();
      updateCartBadge();
      document.getElementById("langToggle").textContent = getLang() === "bn" ? "English" : "বাংলা";

      const settings = await loadThemeAndSettings();
      const lang = getLang();
      const shopName = lang === "bn"
        ? (settings.shopName_bn || settings.shopName_en)
        : (settings.shopName_en || settings.shopName_bn);

      document.getElementById("shopNameText").textContent = shopName || "Shop";
      document.title = (lang === "bn" ? "শপ — " : "Shop — ") + (shopName || "Shop");
      document.getElementById("footerShopName").textContent = shopName || "Shop";
      document.getElementById("footerYear").textContent = new Date().getFullYear();
      if (settings.logoUrl) {
        const logoImg = document.getElementById("logoImg");
        logoImg.src = settings.logoUrl;
        logoImg.style.display = "inline-block";
      }

      document.getElementById("productEmpty").textContent = lang === "bn" ? "লোড হচ্ছে..." : "Loading...";
      document.getElementById("productEmpty").style.display = "block";

      await loadAllProducts();
      await loadCategoryPills();
      applyFilters();

      document.getElementById("searchInput").addEventListener("input", applyFilters);
    }

    init();
  </script>

</body>
</html>
