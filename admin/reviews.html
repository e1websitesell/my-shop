<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>রিভিউ — Shop Admin</title>
<style>
  :root {
    --ink: #1a1d29;
    --ink-soft: #6b7280;
    --line: #e5e7eb;
    --bg: #f7f7f9;
    --accent: #3730a3;
    --sidebar: #1a1d29;
    --gold: #d97706;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--ink); background: var(--bg); }
  .layout { display: flex; min-height: 100vh; }

  .sidebar { width: 220px; flex-shrink: 0; background: var(--sidebar); color: #fff; padding: 24px 16px; display: flex; flex-direction: column; }
  .sidebar .logo { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #9ca3af; padding: 0 10px 20px; }
  .sidebar nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .sidebar nav a { color: #d1d5db; text-decoration: none; padding: 10px 12px; border-radius: 8px; font-size: 14.5px; }
  .sidebar nav a:hover { background: rgba(255,255,255,0.06); }
  .sidebar nav a.active { background: var(--accent); color: #fff; font-weight: 600; }
  .logout-btn { background: transparent; border: 1px solid #374151; color: #d1d5db; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; }
  .logout-btn:hover { background: rgba(255,255,255,0.06); }

  .content { flex: 1; padding: 32px 36px; max-width: 1100px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .topbar h1 { font-size: 22px; margin: 0; font-weight: 600; }
  .user-email { font-size: 13.5px; color: var(--ink-soft); }

  .card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; }
  .card h2 { margin: 0 0 18px; font-size: 16px; font-weight: 600; }

  table.list-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.list-table th, table.list-table td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
  table.list-table th { color: var(--ink-soft); font-weight: 600; font-size: 12.5px; text-transform: uppercase; }
  .muted { color: var(--ink-soft); font-size: 13px; }
  .stars { color: var(--gold); letter-spacing: 1px; white-space: nowrap; }
  .delete-btn { border: none; border-radius: 6px; padding: 6px 10px; font-size: 12.5px; cursor: pointer; font-family: inherit; background: #fef2f2; color: #b91c1c; }
</style>
</head>
<body>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Shop Admin</div>
      <nav>
        <a href="dashboard.html">ড্যাশবোর্ড</a>
        <a href="products.html">প্রোডাক্ট</a>
        <a href="upload-csv.html">CSV আপলোড</a>
        <a href="categories.html">ক্যাটাগরি</a>
        <a href="coupons.html">কুপন</a>
        <a href="reviews.html" class="active">রিভিউ</a>
        <a href="settings.html">সেটিংস</a>
      </nav>
      <button class="logout-btn" id="logoutBtn">লগআউট</button>
    </aside>

    <main class="content">
      <div class="topbar">
        <h1>রিভিউ মডারেশন</h1>
        <span class="user-email" id="userEmail"></span>
      </div>

      <div class="card">
        <h2>সব প্রোডাক্টের রিভিউ (সর্বশেষ ৫০টা)</h2>
        <table class="list-table">
          <thead>
            <tr><th>প্রোডাক্ট</th><th>রিভিউয়ার</th><th>রেটিং</th><th>কমেন্ট</th><th>একশন</th></tr>
          </thead>
          <tbody id="reviewsBody">
            <tr><td colspan="5" class="muted">লোড হচ্ছে...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module">
    import { requireAdmin, adminLogout } from "../assets/js/admin-auth-guard.js";
    import { db } from "../assets/js/firebase-config.js";
    import {
      collectionGroup, collection, query, orderBy, limit,
      getDocs, doc, deleteDoc, updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const user = await requireAdmin();
    document.getElementById("userEmail").textContent = user.email;
    document.getElementById("logoutBtn").addEventListener("click", adminLogout);

    function escapeAttr(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;");
    }

    async function loadReviews() {
      const tbody = document.getElementById("reviewsBody");
      tbody.innerHTML = `<tr><td colspan="5" class="muted">লোড হচ্ছে...</td></tr>`;
      try {
        // এটা একটা collectionGroup কোয়েরি (সব প্রোডাক্টের reviews সাব-কালেকশন একসাথে)।
        // প্রথমবার চালালে Firebase Console-এ একটা "collection group index" বানাতে
        // বলতে পারে createdAt ফিল্ডের জন্য — সেখানে দেখানো লিংকে ক্লিক করলেই হয়ে যাবে,
        // এটা কোডের ভুল না, Firestore-এর স্বাভাবিক নিয়ম।
        const q = query(collectionGroup(db, "reviews"), orderBy("createdAt", "desc"), limit(50));
        const snap = await getDocs(q);

        if (snap.empty) {
          tbody.innerHTML = `<tr><td colspan="5" class="muted">কোনো রিভিউ নেই।</td></tr>`;
          return;
        }

        tbody.innerHTML = "";
        snap.forEach((docSnap) => {
          const r = docSnap.data();
          const productId = docSnap.ref.parent.parent.id;
          const productName = r.productName_bn || r.productName_en || productId;
          const rating = r.rating || 0;
          const stars = "★".repeat(rating) + "☆".repeat(5 - rating);
          const time = (r.createdAt && r.createdAt.toDate) ? r.createdAt.toDate().toLocaleDateString("bn-BD") : "—";

          const tr = document.createElement("tr");
          tr.innerHTML =
            `<td>${escapeAttr(productName)}</td>` +
            `<td>${escapeAttr(r.userName || "—")}<br><span class="muted">${time}</span></td>` +
            `<td class="stars">${stars}</td>` +
            `<td>${escapeAttr(r.comment || "")}</td>` +
            `<td><button class="delete-btn" data-product="${escapeAttr(productId)}" data-id="${escapeAttr(docSnap.id)}">ডিলিট</button></td>`;
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll(".delete-btn").forEach((b) => {
          b.addEventListener("click", () => deleteReview(b.dataset.product, b.dataset.id));
        });
      } catch (e) {
        console.error("রিভিউ লোড করতে সমস্যা হয়েছে:", e);
        tbody.innerHTML = `<tr><td colspan="5" class="muted">লোড করতে সমস্যা হয়েছে। কনসোল (F12) চেক করুন বিস্তারিত জানার জন্য।</td></tr>`;
      }
    }

    async function deleteReview(productId, reviewId) {
      if (!confirm("রিভিউটা ডিলিট করতে চান?")) return;
      try {
        await deleteDoc(doc(db, "products", productId, "reviews", reviewId));
        await recalcProductRating(productId);
        loadReviews();
      } catch (e) {
        console.error("রিভিউ ডিলিট করতে সমস্যা হয়েছে:", e);
        alert("ডিলিট করতে সমস্যা হয়েছে: " + e.message);
      }
    }

    async function recalcProductRating(productId) {
      try {
        const snap = await getDocs(collection(db, "products", productId, "reviews"));
        let total = 0;
        let count = 0;
        snap.forEach((d) => {
          const rating = d.data().rating;
          if (typeof rating === "number") {
            total += rating;
            count++;
          }
        });
        const avgRating = count > 0 ? Math.round((total / count) * 10) / 10 : 0;
        await updateDoc(doc(db, "products", productId), { avgRating, reviewCount: count });
      } catch (e) {
        // রিভিউ ডিলিট হয়ে গেছে, কিন্তু রেটিং রিক্যালকুলেট করতে সমস্যা হলে
        // প্রোডাক্টটা products.html-এ একবার এডিট করে সেভ করলেও ম্যানুয়ালি ঠিক করা যাবে।
        // আসল কারণ জানার জন্য কনসোলে লগ করা হচ্ছে:
        console.error("রেটিং রিক্যালকুলেট করতে সমস্যা হয়েছে:", e);
      }
    }

    loadReviews();
  </script>

</body>
</html>
