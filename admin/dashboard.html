<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Dashboard — Shop Admin</title>
<style>
  :root {
    --ink: #1a1d29;
    --ink-soft: #6b7280;
    --line: #e5e7eb;
    --bg: #f7f7f9;
    --accent: #3730a3;
    --accent-soft: #eef2ff;
    --sidebar: #1a1d29;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: var(--bg);
  }
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--sidebar);
    color: #fff;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
  }
  .sidebar .logo {
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9ca3af;
    padding: 0 10px 20px;
  }
  .sidebar nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .sidebar nav a {
    color: #d1d5db;
    text-decoration: none;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14.5px;
  }
  .sidebar nav a:hover { background: rgba(255,255,255,0.06); }
  .sidebar nav a.active { background: var(--accent); color: #fff; font-weight: 600; }
  .logout-btn {
    background: transparent;
    border: 1px solid #374151;
    color: #d1d5db;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.06); }

  .content { flex: 1; padding: 32px 36px; max-width: 1100px; }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .topbar h1 { font-size: 22px; margin: 0; font-weight: 600; }
  .user-email { font-size: 13.5px; color: var(--ink-soft); }

  .stats { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .stat-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 22px;
    min-width: 160px;
    flex: 1;
  }
  .stat-number { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }

  .orders-section {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px;
  }
  .orders-section h2 { margin: 0 0 16px; font-size: 16px; font-weight: 600; }
  .muted { color: var(--ink-soft); font-size: 14px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { color: var(--ink-soft); font-weight: 600; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.03em; }

  button.btn-complete, button.btn-cancel {
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12.5px;
    cursor: pointer;
    margin-right: 6px;
    font-family: inherit;
  }
  button.btn-complete { background: var(--accent-soft); color: var(--accent); }
  button.btn-cancel { background: #fef2f2; color: #b91c1c; }
</style>
</head>
<body>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Shop Admin</div>
      <nav>
        <a href="dashboard.html" class="active">ড্যাশবোর্ড</a>
        <a href="products.html">প্রোডাক্ট</a>
        <a href="upload-csv.html">CSV আপলোড</a>
        <a href="categories.html">ক্যাটাগরি</a>
        <a href="coupons.html">কুপন</a>
        <a href="reviews.html">রিভিউ</a>
        <a href="settings.html">সেটিংস</a>
      </nav>
      <button class="logout-btn" id="logoutBtn">লগআউট</button>
    </aside>

    <main class="content">
      <div class="topbar">
        <h1>ড্যাশবোর্ড</h1>
        <span class="user-email" id="userEmail"></span>
      </div>

      <section class="stats">
        <div class="stat-card">
          <div class="stat-number" id="productCount">—</div>
          <div class="stat-label">টোটাল প্রোডাক্ট</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="pendingCount">—</div>
          <div class="stat-label">পেন্ডিং অর্ডার</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="couponCount">—</div>
          <div class="stat-label">অ্যাকটিভ কুপন</div>
        </div>
      </section>

      <section class="orders-section">
        <h2>পেন্ডিং অর্ডার</h2>
        <p class="muted" id="ordersEmpty" style="display:none;">কোনো পেন্ডিং অর্ডার নেই।</p>
        <table id="ordersTable" style="display:none;">
          <thead>
            <tr><th>সময়</th><th>কাস্টমার</th><th>ঠিকানা</th><th>প্রোডাক্ট</th><th>টোটাল</th><th>একশন</th></tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script type="module">
    import { requireAdmin, adminLogout } from "../assets/js/admin-auth-guard.js";
    import { db } from "../assets/js/firebase-config.js";
    import {
      collection, query, where, orderBy, limit,
      getDocs, getCountFromServer, doc, updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const user = await requireAdmin();
    document.getElementById("userEmail").textContent = user.email;
    document.getElementById("logoutBtn").addEventListener("click", adminLogout);

    // ---------- হেল্পার ----------
    // কাস্টমার-ইনপুট ডেটা (নাম, ফোন, ঠিকানা, প্রোডাক্ট আইটেম) innerHTML-এ
    // বসানোর আগে এটা দিয়ে এসকেপ করা বাধ্যতামূলক, না হলে XSS রিস্ক থাকে।
    function escapeAttr(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;");
    }

    async function loadStats() {
      try {
        const snap = await getCountFromServer(collection(db, "products"));
        document.getElementById("productCount").textContent = snap.data().count;
      } catch (e) {
        document.getElementById("productCount").textContent = "—";
      }

      try {
        const q = query(collection(db, "orders"), where("status", "==", "pending"));
        const snap = await getCountFromServer(q);
        document.getElementById("pendingCount").textContent = snap.data().count;
      } catch (e) {
        document.getElementById("pendingCount").textContent = "—";
      }

      try {
        const q = query(collection(db, "coupons"), where("active", "==", true));
        const snap = await getCountFromServer(q);
        document.getElementById("couponCount").textContent = snap.data().count;
      } catch (e) {
        document.getElementById("couponCount").textContent = "—";
      }
    }

    async function loadOrders() {
      const ordersBody = document.getElementById("ordersBody");
      const ordersTable = document.getElementById("ordersTable");
      const ordersEmpty = document.getElementById("ordersEmpty");

      try {
        // এই কোয়েরির জন্য Firestore প্রথমবার একটা কম্পোজিট ইনডেক্স
        // তৈরি করতে বলবে কনসোলে — সেখানে দেখানো লিংকে ক্লিক করলেই
        // অটোমেটিক বানিয়ে দেবে, এটা কোডের ভুল না, Firestore-এর স্বাভাবিক নিয়ম।
        const q = query(
          collection(db, "orders"),
          where("status", "==", "pending"),
          orderBy("createdAt", "desc"),
          limit(20)
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          ordersEmpty.textContent = "কোনো পেন্ডিং অর্ডার নেই।";
          ordersEmpty.style.display = "block";
          ordersTable.style.display = "none";
          return;
        }

        ordersBody.innerHTML = "";
        snap.forEach((docSnap) => {
          const order = docSnap.data();
          const itemsText = (order.items || [])
            .map(i => `${i.productName || i.productId}${i.variantName ? " (" + i.variantName + ")" : ""} x${i.qty}`)
            .join(", ");
          const time = (order.createdAt && order.createdAt.toDate)
            ? order.createdAt.toDate().toLocaleString("bn-BD")
            : "—";

          const tr = document.createElement("tr");
          tr.innerHTML =
            "<td>" + time + "</td>" +
            "<td>" + escapeAttr(order.customerName || "—") + "<br><span class='muted'>" + escapeAttr(order.customerPhone || "—") + "</span></td>" +
            "<td>" + escapeAttr(order.district || "—") + ", " + escapeAttr(order.division || "—") + "<br><span class='muted'>" + escapeAttr(order.addressDetails || "") + "</span></td>" +
            "<td>" + escapeAttr(itemsText) + "</td>" +
            "<td>৳" + (order.totalAmount ?? "—") + "</td>" +
            "<td>" +
              "<button class='btn-complete' data-id='" + docSnap.id + "'>সম্পন্ন</button>" +
              "<button class='btn-cancel' data-id='" + docSnap.id + "'>বাতিল</button>" +
            "</td>";
          ordersBody.appendChild(tr);
        });

        ordersEmpty.style.display = "none";
        ordersTable.style.display = "table";

        ordersBody.querySelectorAll(".btn-complete").forEach((btn) => {
          btn.addEventListener("click", () => updateOrderStatus(btn.dataset.id, "completed"));
        });
        ordersBody.querySelectorAll(".btn-cancel").forEach((btn) => {
          btn.addEventListener("click", () => updateOrderStatus(btn.dataset.id, "cancelled"));
        });
      } catch (e) {
  console.error("LOAD ORDER ERROR:", e);
  alert(e.message);
}
    }

    async function updateOrderStatus(orderId, newStatus) {
      try {
        await updateDoc(doc(db, "orders", orderId), { status: newStatus });
        loadOrders();
        loadStats();
      } catch (e) {
        alert("স্ট্যাটাস আপডেট করতে সমস্যা হয়েছে।");
      }
    }

    loadStats();
    loadOrders();
  </script>

</body>
</html>
